services:
  dkim-dashboard:
    # Fixed container_name enforces the single-instance invariant:
    # Compose refuses `docker compose up --scale dkim-dashboard=N` when
    # container_name is set. The dashboard's in-process concurrency model
    # (per-path async mutex over /etc/opendkim writes) is only safe for a
    # single writer against a given config tree — see README § Deployment.
    container_name: dkim-dashboard
    image: ghcr.io/xalior/dkim-dashboard:latest
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      # Mount host OpenDKIM config into non-system paths
      - ${OPENDKIM_CONFIG_DIR:-/etc/opendkim}:/data/opendkim
      - ${OPENDKIM_CONF:-/etc/opendkim.conf}:/data/opendkim.conf:ro
      # Mount PID file directory for service reload (SIGUSR1)
      - ${OPENDKIM_RUN_DIR:-/run/opendkim}:/data/run:ro
    env_file:
      - path: .env
        required: false
    environment:
      # Runtime UID/GID — entrypoint creates the app user to match.
      # Set to your host opendkim user's IDs: `id opendkim`.
      - APP_UID=${APP_UID:-113}
      - APP_GID=${APP_GID:-113}
      # Container-internal paths — match the volume mount targets above.
      - OPENDKIM_CONFIG_DIR=/data/opendkim
      - OPENDKIM_CONF=/data/opendkim.conf
      - OPENDKIM_PID_FILE=/data/run/opendkim.pid
    # Required for the reload feature — allows the container to send
    # SIGUSR1 to the host's opendkim process via its PID file.
    # Remove this if you don't need in-app reload.
    pid: host
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
